name: Claude CI Review

permissions:
  pull-requests: write
  contents: read

on:
  workflow_call:
    inputs:
      ecosystem:
        description: "Força 'java', 'angular', 'nestjs' ou 'ts'. Omita para auto-detecção."
        required: false
        type: string
        default: ""
      advisory-only:
        description: "Define true para rodar sem bloquear o merge (apenas informativo)."
        required: false
        type: boolean
        default: false
      plugin_ref:
        description: "Ref do VRClaudePlugin a usar (branch, tag ou SHA)."
        required: false
        type: string
        default: main
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN:
        required: true
      VRPACKAGETOKEN:
        required: true
    outputs:
      result:
        description: "Resultado do review: BLOCKED, WARNING, APPROVED ou ERROR:<motivo>"
        value: ${{ jobs.review.outputs.result }}

jobs:
  review:
    name: Claude CI Review
    runs-on: ubuntu-latest
    if: github.event.pull_request.draft == false
    permissions:
      contents: read
      pull-requests: write
    outputs:
      result: ${{ steps.capture.outputs.result }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"

      - name: Checkout VRClaudePlugin
        uses: actions/checkout@v7
        with:
          repository: vrsoftbr/VRClaudePlugin
          ref: ${{ inputs.plugin_ref }}
          token: ${{ secrets.VRPACKAGETOKEN }}
          path: .vrclaudeplugin

      - name: Install Claude CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Setup VRClaudePlugin agents and MCP config
        run: |
          mkdir -p ~/.claude/agents
          cp .vrclaudeplugin/agents/*.md ~/.claude/agents/

          cat > ~/.claude/settings.json << 'EOF'
          {
            "mcpServers": {
              "github": {
                "type": "http",
                "url": "https://api.githubcopilot.com/mcp",
                "headers": {
                  "Authorization": "Bearer ${GITHUB_TOKEN}"
                }
              }
            }
          }
          EOF

      - name: Detect ecosystem
        id: detect
        env:
          INPUT_ECOSYSTEM: ${{ inputs.ecosystem }}
        run: |
          if [ -n "$INPUT_ECOSYSTEM" ]; then
            AGENT="${INPUT_ECOSYSTEM}-ci-review"
          elif [ -f "build.gradle" ] || [ -f "build.gradle.kts" ] || \
               [ -f "settings.gradle" ] || [ -f "settings.gradle.kts" ]; then
            AGENT="java-ci-review"
          elif [ -f "package.json" ]; then
            if grep -q '"@angular/core"' package.json 2>/dev/null; then
              AGENT="angular-ci-review"
            elif grep -q '"@nestjs/core"' package.json 2>/dev/null; then
              AGENT="nestjs-ci-review"
            else
              AGENT="ts-ci-review"
            fi
          else
            echo "::error::Ecossistema não detectado. Adicione build.gradle/settings.gradle (Java) ou package.json (Angular/NestJS/TS), ou defina o input 'ecosystem' explicitamente (java | angular | nestjs | ts)."
            exit 1
          fi
          echo "agent=$AGENT" >> "$GITHUB_OUTPUT"
          echo "Using agent: $AGENT"

      - name: Run Claude CI Review
        id: review
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          GITHUB_REPO: ${{ github.repository }}
        run: |
          claude -p --dangerously-skip-permissions --agent "${{ steps.detect.outputs.agent }}" \
            "Revisar o PR $PR_NUMBER no repositório $GITHUB_REPO" \
            | tee /tmp/review_output.txt

      - name: Capture result
        id: capture
        run: |
          RESULT=$(grep '^REVIEW_RESULT=' /tmp/review_output.txt | tail -1 | cut -d= -f2-)
          if [ -z "$RESULT" ]; then RESULT="ERROR:NO_RESULT_LINE"; fi
          echo "result=$RESULT" >> "$GITHUB_OUTPUT"
          echo "Review result: $RESULT"

      - name: Block merge if BLOCKED
        if: "!inputs['advisory-only'] && (steps.capture.outputs.result == 'BLOCKED' || steps.capture.outputs.result == 'ERROR:NO_RESULT_LINE')"
        run: |
          echo "::error::Review bloqueou o merge: resultado '${{ steps.capture.outputs.result }}'. Veja os comentários inline no PR."
          exit 1
